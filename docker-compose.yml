services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finstream
      POSTGRES_PASSWORD: finstream
      POSTGRES_DB: finstream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finstream"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://finstream:finstream@db:5432/finstream
      SECRET_KEY: dev-secret-change-me-0123456789abcdef
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
